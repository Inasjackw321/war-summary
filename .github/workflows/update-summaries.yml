name: Update Conflict Summaries

on:
  schedule:
    - cron: "0 * * * *"    # every hour, on the hour
    - cron: "30 * * * *"   # fallback: every hour at :30 — skipped if data is fresh
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch & summarize (attempt 1)
        id: scrape1
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/fetch_and_summarize.py
        continue-on-error: true

      - name: Fetch & summarize (retry)
        if: steps.scrape1.outcome == 'failure'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "First attempt failed, retrying after 30s..."
          sleep 30
          python scripts/fetch_and_summarize.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update conflict data [$(date -u +'%Y-%m-%d %H:%M UTC')]"

          # Push with retry — re-fetch and rebase on each attempt to handle concurrent runs
          for attempt in 1 2 3 4; do
            git fetch origin main
            git rebase origin/main
            if git push -u origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 5))
          done
          echo "All push attempts failed"
          exit 1
