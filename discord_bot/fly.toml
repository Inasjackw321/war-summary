# Fly.io config — free shared-cpu-1x (256 MB) always-on instance
app            = "war-summary-bot-patient-meadowlark-6013"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  CONFIG_PATH = "/data/config.json"

# Persistent volume — stores channel config across restarts/deploys (free, up to 3 GB)
[[mounts]]
  source      = "war_summary_data"
  destination = "/data"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "immediate"

[http_service]
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
